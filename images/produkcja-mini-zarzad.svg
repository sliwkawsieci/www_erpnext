<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Kokpit zarządczy ERPNext dla pakietu Produkcja Mini</title>
  <desc id="desc">Przykładowy widok kokpitu zarządczego z metrykami produkcji, zakupów, ryzyk i dostaw.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe4"/>
      <stop offset="50%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#edf4ee"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>
  <rect x="26" y="24" width="1548" height="60" rx="18" fill="#fff9f1" stroke="#e7dccd"/>
  <rect x="44" y="38" width="34" height="34" rx="8" fill="#111827"/>
  <text x="95" y="60" font-size="22" font-family="Arial, sans-serif" fill="#4b5563">Pulpit Zarzadzania</text>
  <rect x="1230" y="34" width="250" height="40" rx="20" fill="#f4f1eb" stroke="#e5ddd0"/>
  <text x="1260" y="60" font-size="20" font-family="Arial, sans-serif" fill="#9ca3af">Wyszukaj lub wpisz polecenie</text>

  <text x="46" y="132" font-size="34" font-weight="700" font-family="Georgia, serif" fill="#111827">Kokpit decyzyjny dla wlasciciela i zarzadu</text>
  <text x="46" y="165" font-size="18" font-family="Arial, sans-serif" fill="#6b7280">Sprzedaz, realizacja, zakupy, ryzyka dostaw i plynnosc w jednym widoku.</text>

  <rect x="40" y="190" width="860" height="232" rx="28" fill="#fffaf2" stroke="#eadfce"/>
  <text x="72" y="236" font-size="18" letter-spacing="4" font-family="Arial, sans-serif" fill="#7c6f61">ZARZADZANIE FIRMA MEBLARSKA</text>
  <text x="72" y="286" font-size="58" font-weight="700" font-family="Georgia, serif" fill="#171717">Kokpit decyzyjny</text>
  <text x="72" y="322" font-size="20" font-family="Arial, sans-serif" fill="#6b7280">Stan firmy w jednym widoku: zamowienia, hala, opoznienia i plynnosc.</text>

  <g font-family="Arial, sans-serif">
    <rect x="74" y="354" width="190" height="92" rx="20" fill="#fff" stroke="#e7dfd6"/>
    <text x="96" y="385" font-size="13" letter-spacing="2" fill="#8f8b85">W PRODUKCJI</text>
    <text x="96" y="424" font-size="46" font-weight="700" fill="#111827">34</text>

    <rect x="282" y="354" width="190" height="92" rx="20" fill="#fff" stroke="#e7dfd6"/>
    <text x="304" y="385" font-size="13" letter-spacing="2" fill="#8f8b85">PO TERMINIE</text>
    <text x="304" y="424" font-size="46" font-weight="700" fill="#111827">18</text>

    <rect x="490" y="354" width="190" height="92" rx="20" fill="#fff" stroke="#e7dfd6"/>
    <text x="512" y="385" font-size="13" letter-spacing="2" fill="#8f8b85">RYZYKO DOSTAW</text>
    <text x="512" y="424" font-size="46" font-weight="700" fill="#111827">9</text>

    <rect x="698" y="354" width="164" height="92" rx="20" fill="#fff" stroke="#e7dfd6"/>
    <text x="720" y="385" font-size="13" letter-spacing="2" fill="#8f8b85">PLYNNOSC</text>
    <text x="720" y="424" font-size="32" font-weight="700" fill="#111827">182k</text>
  </g>

  <rect x="928" y="190" width="632" height="232" rx="28" fill="#2d342f"/>
  <text x="964" y="236" font-size="18" letter-spacing="4" font-family="Arial, sans-serif" fill="#d5d2c6">PRIORYTETY DNIA</text>
  <g font-family="Arial, sans-serif">
    <rect x="956" y="260" width="574" height="50" rx="16" fill="#604737"/>
    <text x="980" y="292" font-size="20" font-weight="700" fill="#f7f5ee">18 zamowien jest po terminie dostawy</text>
    <rect x="956" y="324" width="574" height="50" rx="16" fill="#57502f"/>
    <text x="980" y="356" font-size="20" font-weight="700" fill="#f7f5ee">7 zlecen produkcyjnych przekracza plan</text>
    <rect x="956" y="388" width="574" height="50" rx="16" fill="#4e5032"/>
    <text x="980" y="420" font-size="20" font-weight="700" fill="#f7f5ee">11 indeksow spadlo ponizej safety stock</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="40" y="454" width="1518" height="102" rx="24" fill="#fffaf3" stroke="#eadfce"/>
    <text x="72" y="490" font-size="18" letter-spacing="3" fill="#8f8b85">PRZEPLYW ZLECEN</text>
    <g fill="#111827">
      <rect x="68" y="506" width="272" height="30" rx="15" fill="#efe2d4"/>
      <rect x="358" y="506" width="272" height="30" rx="15" fill="#eddcc8"/>
      <rect x="648" y="506" width="272" height="30" rx="15" fill="#e8e6d8"/>
      <rect x="938" y="506" width="272" height="30" rx="15" fill="#e4eadf"/>
      <rect x="1228" y="506" width="272" height="30" rx="15" fill="#f2dfd7"/>
      <text x="94" y="529" font-size="20" font-weight="700">12</text>
      <text x="384" y="529" font-size="20" font-weight="700">26</text>
      <text x="674" y="529" font-size="20" font-weight="700">34</text>
      <text x="964" y="529" font-size="20" font-weight="700">21</text>
      <text x="1254" y="529" font-size="20" font-weight="700">18</text>
    </g>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="40" y="586" width="480" height="176" rx="24" fill="#fff" stroke="#e6ddd2"/>
    <text x="68" y="626" font-size="20" font-weight="700" fill="#4f3d2b">Sprzedaz i realizacja</text>
    <text x="68" y="684" font-size="48" font-weight="700" fill="#111827">143</text>
    <text x="68" y="716" font-size="18" fill="#6b7280">Aktywny portfel zamowien klientow</text>
    <text x="276" y="684" font-size="48" font-weight="700" fill="#111827">1,28 mln</text>
    <text x="276" y="716" font-size="18" fill="#6b7280">Wartosc portfela</text>

    <rect x="560" y="586" width="480" height="176" rx="24" fill="#fff" stroke="#e6ddd2"/>
    <text x="588" y="626" font-size="20" font-weight="700" fill="#14532d">Produkcja</text>
    <text x="588" y="684" font-size="48" font-weight="700" fill="#111827">22</text>
    <text x="588" y="716" font-size="18" fill="#6b7280">Do uruchomienia</text>
    <text x="784" y="684" font-size="48" font-weight="700" fill="#111827">41</text>
    <text x="784" y="716" font-size="18" fill="#6b7280">Zamkniete 7 dni</text>

    <rect x="1080" y="586" width="480" height="176" rx="24" fill="#fff" stroke="#e6ddd2"/>
    <text x="1108" y="626" font-size="20" font-weight="700" fill="#8a3b12">Finanse operacyjne</text>
    <text x="1108" y="684" font-size="48" font-weight="700" fill="#111827">624,7k</text>
    <text x="1108" y="716" font-size="18" fill="#6b7280">Otwarte naleznosci i ekspozycja</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="40" y="792" width="736" height="148" rx="24" fill="#fff" stroke="#e6ddd2"/>
    <text x="68" y="832" font-size="22" font-weight="700" font-family="Georgia, serif" fill="#111827">Zamowienia wymagajace reakcji</text>
    <text x="68" y="872" font-size="18" fill="#9c6e3e">SAL-ORD-2026-00118</text>
    <text x="68" y="904" font-size="16" fill="#6b7280">11 dni po terminie • 92 400 zl</text>
    <text x="398" y="872" font-size="18" fill="#9c6e3e">SAL-ORD-2026-00107</text>
    <text x="398" y="904" font-size="16" fill="#6b7280">14 dni po terminie • 148 500 zl</text>

    <rect x="806" y="792" width="752" height="148" rx="24" fill="#fff" stroke="#e6ddd2"/>
    <text x="834" y="832" font-size="22" font-weight="700" font-family="Georgia, serif" fill="#111827">Materialy ponizej bufora</text>
    <text x="834" y="872" font-size="18" fill="#a44520">PLYTA-DAB-18</text>
    <text x="834" y="904" font-size="16" fill="#6b7280">Projected / Safety: 38 / 120 • Brak: 82</text>
    <text x="1184" y="872" font-size="18" fill="#a44520">FRONT-LAK-MAT</text>
    <text x="1184" y="904" font-size="16" fill="#6b7280">Projected / Safety: 12 / 60 • Brak: 48</text>
